<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片内容自动打标签工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏷️ 图片内容自动打标签工具</h1>
            <p class="subtitle">基于 MobileNet 的 AI 图像识别，自动为您的图片生成分类标签</p>
        </header>

        <main>
            <section id="uploadSection" class="card">
                <h2>📷 上传图片</h2>
                <div id="uploadArea" class="upload-area">
                    <p>点击或拖拽图片到此处</p>
                    <p class="hint">支持 JPG、PNG 格式</p>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
                <button id="uploadBtn" class="btn btn-primary">选择图片</button>
            </section>

            <section id="loadingSection" class="card" style="display: none;">
                <h2>⚙️ 正在处理</h2>
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p id="loadingText">正在加载模型...</p>
                </div>
            </section>

            <section id="resultsSection" class="card" style="display: none;">
                <h2>📊 识别结果</h2>
                <div class="results-container">
                    <div class="image-preview">
                        <h3>原图预览</h3>
                        <img id="previewImage" alt="预览图片">
                    </div>
                    
                    <div class="tags-section">
                        <h3>自动生成的标签</h3>
                        <div id="tagsContainer" class="tags-container"></div>
                    </div>
                    
                    <div class="predictions-section">
                        <h3>详细识别结果</h3>
                        <div id="predictionsList" class="predictions-list"></div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button id="copyTagsBtn" class="btn btn-secondary">复制所有标签</button>
                    <button id="resetBtn" class="btn btn-secondary">重新上传</button>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 图片内容自动打标签工具 | Powered by TensorFlow.js & MobileNet</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
