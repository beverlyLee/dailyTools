version: '3.8'

services:
  web:
    build: .
    container_name: food-price-dashboard
    ports:
      - "8050:8050"
    volumes:
      - ./backend/data:/app/backend/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
