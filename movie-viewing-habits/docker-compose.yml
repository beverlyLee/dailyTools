version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: movie-habits-backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-your-secret-key-here}
      - DEBUG=${DEBUG:-True}
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - ./backend:/app
      - sqlite_data:/app/db.sqlite3
    networks:
      - movie-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movie-habits-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - movie-network

networks:
  movie-network:
    driver: bridge

volumes:
  sqlite_data:
