<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户评论关键观点提取工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>用户评论关键观点提取工具</h1>
            <p>帮助产品经理从海量 App 评论中快速抓住核心痛点</p>
        </header>

        <div class="input-section">
            <div class="input-header">
                <h2>输入评论</h2>
                <div class="controls">
                    <button id="loadSample" class="btn btn-secondary">加载示例评论</button>
                    <button id="clearInput" class="btn btn-secondary">清空</button>
                </div>
            </div>
            <textarea id="reviewInput" placeholder="请粘贴评论内容，每条评论占一行..."></textarea>
            <div class="input-stats">
                <span>已输入 <span id="reviewCount">0</span> 条评论</span>
                <span>共 <span id="charCount">0</span> 个字符</span>
            </div>
            <button id="analyzeBtn" class="btn btn-primary">开始分析</button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <h2>分析结果</h2>
                <div class="controls">
                    <select id="clusterCount">
                        <option value="3">3 个主题</option>
                        <option value="5" selected>5 个主题</option>
                        <option value="7">7 个主题</option>
                        <option value="10">10 个主题</option>
                    </select>
                </div>
            </div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>正在分析评论，请稍候...</p>
            </div>
            <div id="results" class="results"></div>
        </div>
    </div>

    <script src="src/SentenceSplitter.js"></script>
    <script src="src/TextRank.js"></script>
    <script src="src/TopicClusterer.js"></script>
    <script src="src/sampleData.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
