version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-chatbot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-chatbot-backend
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2:7b
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/smart_chatbot
      - FAISS_INDEX_PATH=./faiss_index
      - EMBEDDING_MODEL=nomic-embed-text
      - INTENT_THRESHOLD=0.7
    ports:
      - "8000:8000"
    volumes:
      - ./backend/faiss_index:/app/faiss_index
      - ./docs:/app/docs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smart-chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-chatbot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - smart-chatbot-network

networks:
  smart-chatbot-network:
    driver: bridge

volumes:
  postgres_data:
