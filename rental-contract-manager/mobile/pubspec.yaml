name: rental_contract_manager
description: 租房合同全生命周期管理系统移动端应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  http: ^1.1.0
  dio: ^5.4.0
  
  # 路由
  go_router: ^12.1.3
  
  # 图片和文件
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  
  # PDF预览
  flutter_pdfview: ^1.2.7
  pdfx: ^2.4.0
  
  # 日期时间
  intl: ^0.18.1
  table_calendar: ^3.0.9
  
  # 表单
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^9.1.0
  
  # 数据持久化
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 工具类
  equatable: ^2.0.5
  logger: ^2.0.2+1
  fluttertoast: ^8.2.4
  
  # UI组件
  flutter_slidable: ^3.0.1
  badges: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
