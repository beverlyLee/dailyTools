server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: smart-contract-lifecycle

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    com.smartcontract: DEBUG
    org.springframework: INFO

app:
  ocr:
    language: chi_sim+eng
    tessdata-path: tessdata/
  
  contract-templates:
    path: templates/
  
  esignature:
    ca-cert-path: ca/
    key-store-path: keystore/
    key-store-password: changeit

reminder:
  advance-days: 7
  email-notification: true
  sms-notification: false
