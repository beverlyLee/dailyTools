[package]
name = "edge_voice_wakeup"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]
console_error_panic_hook = ["dep:console_error_panic_hook"]
simd = []

[dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3" }
js-sys = "0.3"
console_error_panic_hook = { version = "0.1", optional = true }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
