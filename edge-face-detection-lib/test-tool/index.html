<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edge Face Detection - 测试工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .controls {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .controls h2 {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 15px;
    }

    .control-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }

    .control-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .control-item label {
      font-size: 0.85rem;
      color: #666;
    }

    .control-item input[type="range"] {
      width: 150px;
    }

    .control-item select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    button.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button.secondary {
      background: #f0f0f0;
      color: #333;
    }

    button.secondary:hover {
      background: #e0e0e0;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .panel h2 {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 15px;
    }

    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-container video,
    .video-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-container canvas {
      pointer-events: none;
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #999;
    }

    .log-container {
      background: #1e1e1e;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 15px;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-line {
      margin-bottom: 5px;
    }

    .log-time {
      color: #888;
      margin-right: 10px;
    }

    .log-info {
      color: #00bfff;
    }

    .log-success {
      color: #00ff00;
    }

    .log-error {
      color: #ff4444;
    }

    .log-warning {
      color: #ffaa00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Edge Face Detection</h1>

    <div class="controls">
      <h2>⚙️ 控制面板</h2>
      <div class="control-group">
        <div class="button-group">
          <button id="initBtn" class="primary">初始化检测器</button>
          <button id="startCameraBtn" class="secondary">开启摄像头</button>
          <button id="stopCameraBtn" class="secondary" disabled>停止摄像头</button>
          <div class="file-input-wrapper">
            <button class="secondary">选择图片</button>
            <input type="file" id="imageInput" accept="image/*">
          </div>
        </div>
      </div>

      <div class="control-group" style="margin-top: 15px;">
        <div class="control-item">
          <label>最小人脸尺寸: <span id="minFaceSizeValue">20</span>px</label>
          <input type="range" id="minFaceSize" min="10" max="100" value="20">
        </div>
        <div class="control-item">
          <label>缩放因子: <span id="scaleFactorValue">1.1</span></label>
          <input type="range" id="scaleFactor" min="105" max="150" value="110">
        </div>
        <div class="control-item">
          <label>置信度阈值: <span id="scoreThresholdValue">0.7</span></label>
          <input type="range" id="scoreThreshold" min="10" max="100" value="70">
        </div>
        <div class="control-item">
          <label>关键点检测</label>
          <select id="landmarkType">
            <option value="0">不检测</option>
            <option value="5">5点</option>
            <option value="68">68点</option>
          </select>
        </div>
        <div class="control-item">
          <label>使用 Web Worker</label>
          <select id="useWorker">
            <option value="true">是</option>
            <option value="false">否</option>
          </select>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="panel">
        <h2>📷 视频/图像预览</h2>
        <div class="video-container">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>
        </div>
        <div class="stats">
          <div class="stat-item">
            <span class="stat-value" id="fpsValue">-</span>
            <span class="stat-label">FPS</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="faceCountValue">0</span>
            <span class="stat-label">检测到的人脸</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="inferenceTimeValue">-</span>
            <span class="stat-label">推理时间 (ms)</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>📋 检测日志</h2>
        <div class="log-container" id="logContainer"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
