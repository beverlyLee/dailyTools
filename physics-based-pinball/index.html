<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理弹球游戏</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    
    #game-container {
      position: relative;
    }
    
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    
    #ui-overlay > * {
      pointer-events: auto;
    }
    
    .score-display {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
    
    .balls-display {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
    
    .game-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      display: none;
    }
    
    .button {
      background: linear-gradient(180deg, #e94560 0%, #c73e54 100%);
      border: none;
      color: white;
      padding: 12px 24px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .menu-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    
    .menu-screen h1 {
      color: #e94560;
      font-size: 48px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }
    
    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .high-scores {
      margin-top: 30px;
      color: #fff;
      text-align: center;
    }
    
    .high-scores h3 {
      color: #e94560;
      margin-bottom: 10px;
    }
    
    .high-scores ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .high-scores li {
      padding: 5px 0;
      font-size: 16px;
    }
    
    .editor-tools {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      pointer-events: auto;
    }
    
    .editor-tool {
      padding: 8px 16px;
      background: #333;
      color: #fff;
      border: 2px solid #555;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .editor-tool.active {
      background: #e94560;
      border-color: #ff6b8a;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay">
      <div class="score-display">得分: <span id="score">0</span></div>
      <div class="balls-display">剩余球: <span id="balls">3</span></div>
      <div id="game-message" class="game-message"></div>
      
      <div id="main-menu" class="menu-screen">
        <h1>🎮 物理弹球</h1>
        <div class="menu-buttons">
          <button class="button" id="start-game">开始游戏</button>
          <button class="button" id="level-editor">关卡编辑器</button>
          <button class="button" id="load-level">加载关卡</button>
        </div>
        <div class="high-scores">
          <h3>🏆 高分榜</h3>
          <ul id="high-scores-list"></ul>
        </div>
      </div>
      
      <div id="editor-tools" class="editor-tools" style="display: none;">
        <button class="editor-tool active" data-tool="bumper">缓冲器</button>
        <button class="editor-tool" data-tool="wall">墙壁</button>
        <button class="editor-tool" data-tool="flipper">弹板</button>
        <button class="editor-tool" data-tool="goal">目标</button>
        <button class="button" id="save-level">保存关卡</button>
        <button class="button" id="play-level">测试关卡</button>
        <button class="button" id="exit-editor">退出</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
