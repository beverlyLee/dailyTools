<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人实时贪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="lobby-screen" class="screen active">
            <div class="container">
                <h1>🐍 多人实时贪吃蛇</h1>
                <div class="form-group">
                    <label for="player-name">你的名字</label>
                    <input type="text" id="player-name" placeholder="输入你的名字" maxlength="20">
                </div>
                <div class="button-group">
                    <button id="create-room-btn" class="btn btn-primary">创建房间</button>
                    <button id="join-room-btn" class="btn btn-secondary">加入房间</button>
                </div>
                <div id="join-room-form" class="hidden">
                    <div class="form-group">
                        <label for="room-id">房间ID 或 邀请码</label>
                        <input type="text" id="room-id" placeholder="输入房间ID或邀请码">
                    </div>
                    <button id="confirm-join-btn" class="btn btn-primary">确认加入</button>
                </div>
                <div id="room-list" class="room-list hidden">
                    <h3>可用房间</h3>
                    <div id="rooms-container"></div>
                </div>
            </div>
        </div>

        <div id="waiting-screen" class="screen">
            <div class="container">
                <h2>等待中...</h2>
                <div id="room-info">
                    <p>房间: <span id="room-name-display"></span></p>
                    <p>邀请链接: <span id="invite-link"></span></p>
                    <button id="copy-link-btn" class="btn btn-small">复制链接</button>
                </div>
                <h3>玩家列表</h3>
                <ul id="player-list"></ul>
                <div id="start-game-btn-container" class="hidden">
                    <button id="start-game-btn" class="btn btn-success">开始游戏</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-container">
                <div class="game-header">
                    <h2>游戏进行中</h2>
                    <div id="scoreboard">
                        <h3>分数</h3>
                        <div id="scores"></div>
                    </div>
                </div>
                <canvas id="game-canvas"></canvas>
                <div class="controls-hint">
                    使用 <strong>↑ ↓ ← →</strong> 或 <strong>W A S D</strong> 控制方向
                </div>
            </div>
        </div>

        <div id="game-over-screen" class="screen">
            <div class="container">
                <h2>游戏结束!</h2>
                <div id="winner-display"></div>
                <div id="final-scores">
                    <h3>最终分数</h3>
                    <div id="final-scores-list"></div>
                </div>
                <button id="back-to-lobby-btn" class="btn btn-primary">返回大厅</button>
            </div>
        </div>

        <div id="error-message" class="error-message hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
