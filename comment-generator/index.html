<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能代码注释生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        header {
            padding: 16px 24px;
            background: #252526;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #569cd6;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        select, button {
            padding: 8px 16px;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            background: #3c3c3c;
            color: #d4d4d4;
            transition: all 0.2s;
        }
        select:hover, button:hover {
            background: #4a4a4a;
        }
        button {
            background: #007acc;
            border-color: #007acc;
            color: white;
            font-weight: 500;
        }
        button:hover {
            background: #0066a8;
        }
        button:disabled {
            background: #3c3c3c;
            border-color: #3c3c3c;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }
        .editor-header {
            padding: 10px 16px;
            background: #2d2d2d;
            font-size: 13px;
            color: #858585;
            border-bottom: 1px solid #333;
        }
        #editor {
            flex: 1;
            height: 100%;
        }
        .output-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }
        #output {
            flex: 1;
            padding: 20px;
            overflow: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .status-bar {
            padding: 8px 16px;
            background: #007acc;
            color: white;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .loading {
            display: none;
            align-items: center;
            gap: 8px;
        }
        .loading.active {
            display: flex;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff33;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
</head>
<body>
    <header>
        <h1>智能代码注释生成器</h1>
        <div class="controls">
            <select id="language-select">
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="python">Python</option>
            </select>
            <select id="comment-style">
                <option value="jsdoc">JSDoc 风格</option>
                <option value="google">Google 风格</option>
                <option value="numpy">NumPy 风格 (Python)</option>
            </select>
            <button id="generate-btn">生成注释</button>
        </div>
    </header>
    
    <div class="container">
        <div class="editor-container">
            <div class="editor-header">输入代码 (选中要注释的代码段)</div>
            <div id="editor"></div>
        </div>
        <div class="output-container">
            <div class="editor-header">生成的注释</div>
            <div id="output"></div>
        </div>
    </div>
    
    <div class="status-bar">
        <span id="status-text">就绪</span>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>正在分析代码...</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
