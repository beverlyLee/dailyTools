<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒙特卡洛圆周率估算</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>蒙特卡洛圆周率估算</h1>
            <p class="subtitle">使用 Go 并发特性和 HTML5 Canvas</p>
        </header>

        <div class="main-content">
            <div class="canvas-section">
                <h2>投点可视化</h2>
                <div class="canvas-container">
                    <canvas id="piCanvas" width="500" height="500"></canvas>
                </div>
                <div class="canvas-info">
                    <span id="pointCount">已投点: 0</span>
                    <span id="circleCount">圆内: 0</span>
                    <span id="squareCount">圆外: 0</span>
                </div>
            </div>

            <div class="control-section">
                <div class="control-panel">
                    <h2>控制面板</h2>
                    
                    <div class="form-group">
                        <label for="sampleSize">投点数量:</label>
                        <select id="sampleSize">
                            <option value="1000">1,000</option>
                            <option value="10000">10,000</option>
                            <option value="100000">100,000</option>
                            <option value="1000000" selected>1,000,000</option>
                            <option value="10000000">10,000,000</option>
                            <option value="50000000">50,000,000</option>
                            <option value="100000000">100,000,000</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="workerCount">并发数 (Goroutines):</label>
                        <select id="workerCount">
                            <option value="0">自动 (使用 CPU 核心数)</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="4">4</option>
                            <option value="8">8</option>
                            <option value="16">16</option>
                            <option value="32">32</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="animationSpeed">动画速度:</label>
                        <select id="animationSpeed">
                            <option value="0">无动画 (仅统计)</option>
                            <option value="10">极快</option>
                            <option value="50">快速</option>
                            <option value="100" selected>正常</option>
                            <option value="200">慢速</option>
                            <option value="500">极慢</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button id="startBtn" class="btn btn-primary">开始估算</button>
                        <button id="animateBtn" class="btn btn-secondary">播放动画</button>
                        <button id="resetBtn" class="btn btn-danger">重置</button>
                    </div>
                </div>

                <div class="result-panel">
                    <h2>估算结果</h2>
                    <div class="result-grid">
                        <div class="result-item">
                            <label>估算 π 值:</label>
                            <div class="value highlight" id="estimatedPi">--</div>
                        </div>
                        <div class="result-item">
                            <label>实际 π 值:</label>
                            <div class="value" id="actualPi">3.141592653589793</div>
                        </div>
                        <div class="result-item">
                            <label>误差:</label>
                            <div class="value" id="errorPercentage">--</div>
                        </div>
                        <div class="result-item">
                            <label>执行时间:</label>
                            <div class="value" id="duration">--</div>
                        </div>
                    </div>
                </div>

                <div class="method-explanation">
                    <h3>蒙特卡洛方法说明</h3>
                    <p>在边长为 2 的正方形中内切一个半径为 1 的圆。</p>
                    <p>正方形面积 = 4，圆面积 = π</p>
                    <p>随机投入 N 个点，落入圆内的概率 = π/4</p>
                    <p>因此: π ≈ 4 × (圆内点数 / 总点数)</p>
                </div>
            </div>
        </div>

        <div class="history-section">
            <h2>估算历史 (大数定律展示)</h2>
            <div class="history-controls">
                <button id="loadHistoryBtn" class="btn btn-secondary">加载历史</button>
                <button id="clearHistoryBtn" class="btn btn-danger">清除历史</button>
            </div>
            <div class="chart-container">
                <canvas id="historyChart" width="800" height="300"></canvas>
            </div>
            <div class="history-table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>样本量</th>
                            <th>估算值</th>
                            <th>误差</th>
                            <th>耗时</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="5" class="no-data">暂无历史数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
