server:
  port: 8080

spring:
  application:
    name: bigdata-dev-kit
  datasource:
    url: jdbc:h2:file:./data/bigdata_dev_kit;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

file:
  upload:
    dir: ./uploads/jars
  sql:
    dir: ./uploads/sqls

logging:
  level:
    com.bigdata.devkit: DEBUG
    org.hibernate.SQL: DEBUG
