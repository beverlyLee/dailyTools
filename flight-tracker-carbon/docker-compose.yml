version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flight-tracker-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/flights.duckdb
      - SIM_FLIGHT_COUNT=50
    volumes:
      - duckdb_data:/data
    networks:
      - flight-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flight-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - flight-network
    restart: unless-stopped

networks:
  flight-network:
    driver: bridge

volumes:
  duckdb_data:
