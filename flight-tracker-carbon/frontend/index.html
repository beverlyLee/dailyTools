<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球航班实时追踪与碳排放</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #infoPanel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 350px;
      max-height: 400px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border-radius: 8px;
      padding: 15px;
      font-family: sans-serif;
      overflow-y: auto;
      z-index: 1000;
    }
    #infoPanel h3 {
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 5px;
    }
    .flight-item {
      padding: 8px;
      margin: 5px 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    .flight-item:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .co2-badge {
      display: inline-block;
      padding: 2px 6px;
      background: #4CAF50;
      border-radius: 3px;
      font-size: 12px;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="infoPanel">
    <h3>航班追踪</h3>
    <div id="flightList"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
