<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 推箱子解谜游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      background-color: #1a1a2e;
      color: white;
    }
    
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    
    .pointer-events-auto {
      pointer-events: auto;
    }
    
    #game-info {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 10px;
      color: white;
    }
    
    #game-info h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #4CAF50;
    }
    
    #game-info p {
      margin: 5px 0;
      font-size: 14px;
    }
    
    #controls-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }
    
    #controls-info h3 {
      margin-bottom: 10px;
      color: #2196F3;
    }
    
    #controls-info ul {
      list-style: none;
      padding-left: 0;
    }
    
    #controls-info li {
      margin: 5px 0;
    }
    
    #game-buttons {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .game-button {
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.3s;
    }
    
    .game-button:hover {
      background-color: rgba(0, 0, 0, 0.9);
    }
    
    .game-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #level-select {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
      border-radius: 5px;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
    
    #level-select option {
      background-color: #1a1a2e;
      color: white;
    }
    
    #win-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: rgba(76, 175, 80, 0.9);
      color: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      display: none;
      z-index: 20;
    }
    
    #win-message h2 {
      font-size: 32px;
      margin-bottom: 15px;
    }
    
    #win-message p {
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-layer">
      <div id="game-info" class="pointer-events-auto">
        <h1>3D 推箱子</h1>
        <p>关卡: <span id="current-level">1</span></p>
        <p>步数: <span id="move-count">0</span></p>
        <p>箱子到位: <span id="boxes-on-target">0</span>/<span id="total-boxes">0</span></p>
      </div>
      
      <select id="level-select" class="pointer-events-auto">
        <option value="0">教程关卡</option>
        <option value="1">关卡 1: 入门</option>
        <option value="2">关卡 2: 进阶</option>
        <option value="3">关卡 3: 挑战</option>
        <option value="4">关卡 4: 专家</option>
      </select>
      
      <div id="game-buttons" class="pointer-events-auto">
        <button id="undo-btn" class="game-button">撤销 (Z)</button>
        <button id="redo-btn" class="game-button">重做 (Y)</button>
        <button id="reset-btn" class="game-button">重置关卡 (R)</button>
        <button id="save-btn" class="game-button">保存进度</button>
        <button id="load-btn" class="game-button">加载进度</button>
      </div>
      
      <div id="controls-info">
        <h3>操作说明</h3>
        <ul>
          <li>↑ / W - 上移</li>
          <li>↓ / S - 下移</li>
          <li>← / A - 左移</li>
          <li>→ / D - 右移</li>
          <li>鼠标拖拽 - 旋转视角</li>
          <li>滚轮 - 缩放</li>
        </ul>
      </div>
      
      <div id="win-message" class="pointer-events-auto">
        <h2>🎉 恭喜过关！</h2>
        <p>你用了 <span id="final-moves">0</span> 步完成了这个关卡</p>
        <button id="next-level-btn" class="game-button">下一关</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
