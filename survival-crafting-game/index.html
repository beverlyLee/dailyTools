<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生存建造游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    #game-container {
      position: relative;
      width: 1280px;
      height: 720px;
      border: 2px solid #4a4a6a;
      border-radius: 8px;
      overflow: hidden;
    }
    #game {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
