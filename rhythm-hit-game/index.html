<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>节奏打击游戏 - Rhythm Hit Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      z-index: 100;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 16px;
      opacity: 0.8;
    }

    #start-screen, #game-over-screen, #editor-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.95);
      color: #fff;
      z-index: 50;
    }

    .active {
      display: flex !important;
    }

    .title {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
    }

    .btn {
      padding: 15px 40px;
      margin: 10px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 200px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      color: #fff;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      border-color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .score-display {
      font-size: 48px;
      font-weight: bold;
      color: #e94560;
      margin: 20px 0;
    }

    .stats {
      display: flex;
      gap: 30px;
      margin: 20px 0;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      display: none;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 30;
      pointer-events: none;
    }

    #hud.active {
      display: flex;
    }

    .hud-item {
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 20px;
      border-radius: 10px;
      color: #fff;
      font-weight: bold;
    }

    .combo-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      font-weight: bold;
      color: #e94560;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 40;
    }

    .combo-display.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .judge-text {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 40;
    }

    .judge-text.perfect { color: #ffd700; }
    .judge-text.great { color: #00ff88; }
    .judge-text.good { color: #00aaff; }
    .judge-text.miss { color: #ff4444; }

    .judge-text.show {
      opacity: 1;
      animation: judgePop 0.5s ease-out;
    }

    @keyframes judgePop {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    .editor-container {
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .editor-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .editor-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }

    .editor-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }

    .editor-input:focus {
      outline: none;
      border-color: #e94560;
    }

    .timeline {
      width: 100%;
      height: 100px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      position: relative;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .timeline-track {
      display: flex;
      height: 100%;
      align-items: center;
      padding: 0 20px;
      min-width: 100%;
    }

    .beat-marker {
      width: 10px;
      height: 30px;
      background: #e94560;
      border-radius: 5px;
      margin: 0 40px;
      cursor: pointer;
      position: relative;
    }

    .beat-marker:hover {
      background: #ff6b6b;
    }

    .beat-marker::after {
      content: attr(data-time);
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #888;
      white-space: nowrap;
    }

    .audio-upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .audio-upload-area:hover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.1);
    }

    .audio-upload-area.dragover {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.2);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #888;
      font-size: 14px;
    }

    .track-lanes {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    .lane-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid;
      background: transparent;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .lane-btn.lane-0 { border-color: #ff6b6b; color: #ff6b6b; }
    .lane-btn.lane-1 { border-color: #4ecdc4; color: #4ecdc4; }
    .lane-btn.lane-2 { border-color: #ffe66d; color: #ffe66d; }
    .lane-btn.lane-3 { border-color: #a78bfa; color: #a78bfa; }

    .lane-btn.active {
      background: currentColor;
      color: #000;
    }

    .lane-btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 768px) {
      .title { font-size: 28px; }
      .btn { padding: 12px 30px; font-size: 14px; min-width: 160px; }
      .stats { gap: 20px; }
      .stat-value { font-size: 20px; }
      .lane-btn { width: 50px; height: 50px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="loading" class="active">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>

    <div id="start-screen">
      <h1 class="title">节奏打击</h1>
      <p class="subtitle">Rhythm Hit Game</p>
      <button class="btn btn-primary" id="btn-start">开始游戏</button>
      <button class="btn btn-secondary" id="btn-editor">谱面编辑</button>
    </div>

    <div id="hud">
      <div class="hud-item">分数: <span id="score">0</span></div>
      <div class="hud-item">连击: <span id="combo">0</span></div>
      <div class="hud-item">HP: <span id="hp">100</span></div>
    </div>

    <div id="combo-display" class="combo-display"></div>
    <div id="judge-text" class="judge-text"></div>

    <div id="game-over-screen">
      <h1 class="title">游戏结束</h1>
      <div class="score-display" id="final-score">0</div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="stat-perfect">0</div>
          <div class="stat-label">PERFECT</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-great">0</div>
          <div class="stat-label">GREAT</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-good">0</div>
          <div class="stat-label">GOOD</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-miss">0</div>
          <div class="stat-label">MISS</div>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="max-combo">0</div>
        <div class="stat-label">最高连击</div>
      </div>
      <button class="btn btn-primary" id="btn-retry">再来一次</button>
      <button class="btn btn-secondary" id="btn-back">返回主页</button>
    </div>

    <div id="editor-screen">
      <div class="editor-container">
        <h2 style="margin-bottom: 20px; color: #e94560;">谱面编辑器</h2>
        
        <div class="editor-section">
          <div class="editor-label">歌曲信息</div>
          <input type="text" id="song-name" class="editor-input" placeholder="歌曲名称">
        </div>

        <div class="editor-section">
          <div class="editor-label">BPM (每分钟节拍数)</div>
          <input type="number" id="song-bpm" class="editor-input" placeholder="例如: 120" value="120">
        </div>

        <div class="editor-section">
          <div class="editor-label">音频文件</div>
          <div class="audio-upload-area" id="audio-upload">
            <div class="upload-icon">🎵</div>
            <div class="upload-text">点击或拖拽上传音频文件 (mp3, wav)</div>
          </div>
          <input type="file" id="audio-file" accept="audio/*" style="display: none;">
          <div id="audio-info" style="margin-top: 10px; color: #888; display: none;">
            已加载: <span id="audio-name"></span> (时长: <span id="audio-duration"></span>秒)
          </div>
        </div>

        <div class="editor-section">
          <div class="editor-label">节拍时间线 (点击添加/删除节拍)</div>
          <div class="timeline" id="timeline">
            <div class="timeline-track" id="timeline-track"></div>
          </div>
          <div style="margin-top: 15px; font-size: 12px; color: #888;">
            当前时间: <span id="current-time">0.00</span>秒 | 点击下方轨道按钮添加节拍
          </div>
        </div>

        <div class="editor-section">
          <div class="editor-label">选择轨道 (0-3)</div>
          <div class="track-lanes">
            <button class="lane-btn lane-0 active" data-lane="0">1</button>
            <button class="lane-btn lane-1" data-lane="1">2</button>
            <button class="lane-btn lane-2" data-lane="2">3</button>
            <button class="lane-btn lane-3" data-lane="3">4</button>
          </div>
        </div>

        <div class="editor-section">
          <div class="editor-label">控制</div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary" id="btn-play-preview">预览播放</button>
            <button class="btn btn-secondary" id="btn-stop-preview">停止</button>
            <button class="btn btn-primary" id="btn-save-chart">保存谱面</button>
            <button class="btn btn-secondary" id="btn-load-chart">加载谱面</button>
          </div>
        </div>

        <button class="btn btn-secondary" id="btn-editor-back" style="margin-top: 20px;">返回</button>
      </div>
    </div>

    <div class="track-lanes" id="game-lanes" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none;">
      <button class="lane-btn lane-0" data-lane="0">1</button>
      <button class="lane-btn lane-1" data-lane="1">2</button>
      <button class="lane-btn lane-2" data-lane="2">3</button>
      <button class="lane-btn lane-3" data-lane="3">4</button>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
